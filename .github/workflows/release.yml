name: Release

# Builds a distributable macOS .dmg and publishes it to GitHub Releases.
#
# Trigger: push a version tag (e.g. `v0.1.0`), or run manually from the Actions tab.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# IMPORTANT — this always produces a "bring-your-own-credentials" build:
#   `src-tauri/.env` is gitignored and never present in a clean CI checkout, so
#   nothing is baked in (build.rs finds no .env → credentials source is "none").
#   On first launch each user pastes their own Google Client ID + secret. This is
#   the ONLY build that works for people you can't add as Test users of your own
#   Google Cloud project — never publish your personal baked build.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  build:
    # macos-15: Apple Silicon (arm64) runner with Xcode 16 / the macOS 15 SDK. The SDK
    # matters — native/syscapture.m references macOS 15 APIs (SCStreamOutputTypeMicrophone,
    # captureMicrophone) that the older macos-14 runner's SDK doesn't declare, so it won't
    # compile there. Those APIs are runtime-guarded with `@available(macOS 15.0, *)`, and
    # the deployment target stays 13.0, so the artifact still runs on macOS 13+.
    runs-on: macos-15
    env:
      # Sign with the maintainer's "Ember Dev" self-signed cert when its .p12 is
      # configured as a secret (imported in the step below). A cert-based signature
      # keeps a STABLE designated requirement (`identifier + certificate leaf`), so
      # macOS TCC grants — Screen Recording for meeting capture — survive app updates.
      # Without the secret (forks), fall back to ad-hoc ("-"), whose per-build cdhash
      # requirement silently invalidates those grants on every release: System Settings
      # keeps showing the toggle ON while ScreenCaptureKit is denied. Either way the
      # .dmg is not notarized — users get past Gatekeeper via the steps in INSTALL.md.
      # (HAS_SIGNING_CERT exists because the `secrets` context is not allowed in a
      # step-level `if:` — only env is.)
      HAS_SIGNING_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_CERTIFICATE != '' && 'Ember Dev' || '-' }}
      # Force a portable arm64 whisper build (GGML_NATIVE=OFF). Without this, ggml's
      # -mcpu=native both (a) fails to compile on the runner and (b) would bake in
      # i8mm instructions that SIGILL-crash on M1 Macs. whisper-rs-sys forwards any
      # CMAKE_* env var to cmake; CMAKE_PROJECT_INCLUDE runs our shim after project().
      CMAKE_PROJECT_INCLUDE: ${{ github.workspace }}/src-tauri/cmake/portable-arm64.cmake
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Import signing certificate
        # Temp-keychain import per https://v2.tauri.app/distribute/sign/macos — the
        # keychain lives only for this ephemeral runner; the password never leaves it.
        if: ${{ env.HAS_SIGNING_CERT == 'true' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain >/dev/null
          rm certificate.p12
          security find-identity -v -p codesigning build.keychain

      - name: Build the app (.app + .dmg)
        run: npm run tauri build

      - name: Locate the .dmg and compute checksum
        id: artifact
        run: |
          set -euo pipefail
          dmg="$(find src-tauri/target -name '*.dmg' -print -quit)"
          if [ -z "$dmg" ]; then
            echo "No .dmg produced by the build" >&2
            exit 1
          fi
          shasum -a 256 "$dmg" | tee "$dmg.sha256"
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            "${{ steps.artifact.outputs.dmg }}" \
            "${{ steps.artifact.outputs.dmg }}.sha256" \
            --title "Ember $tag" \
            --notes "Apple-Silicon macOS build (self-signed, not notarized). See [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/INSTALL.md) for setup — including getting past Gatekeeper and connecting your own Google credentials. Upgrading from v0.1.0 or earlier? Re-grant Screen Recording once (INSTALL.md, \"Upgrading\").

          Verify your download:
          \`\`\`
          shasum -a 256 -c Ember_*_aarch64.dmg.sha256
          \`\`\`"

      - name: Upload build artifact (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ember-dmg
          path: |
            ${{ steps.artifact.outputs.dmg }}
            ${{ steps.artifact.outputs.dmg }}.sha256
