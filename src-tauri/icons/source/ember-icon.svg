<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Diagonal coral (top-left) → pink (bottom-right) background. userSpaceOnUse so the
         inner-flame cutout below can sample the SAME gradient at its position (looks like the
         background showing through), not a re-mapped mini-gradient. -->
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="180" y2="180">
      <stop offset="0" stop-color="#3FBF6F"/>
      <stop offset="1" stop-color="#1F8F52"/>
    </linearGradient>
  </defs>
  <!-- translate(92) + scale(4.6667): a 180-unit design square → an 840px squircle centred on the
       1024 canvas with a ~92px transparent margin (native-looking macOS Dock icon). -->
  <g transform="translate(92,92) scale(4.6666667)">
    <rect x="0" y="0" width="180" height="180" rx="42" fill="url(#bg)"/>
    <!-- Solid dark flame (brand charcoal-brown). -->
    <path fill="#2A1410" d="M90 40 C 104 66 120 86 120 112 C 120 138 104 152 90 152 C 76 152 60 138 60 112 C 60 90 74 74 90 40 Z"/>
    <!-- Inner-flame highlight: the background gradient showing through near the base. -->
    <path fill="url(#bg)" d="M90 102 C 99 115 102 124 98 134 C 94 142 91 144 90 144 C 89 144 86 142 82 134 C 78 124 81 115 90 102 Z"/>
  </g>
</svg>
